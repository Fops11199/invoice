services:
  - type: web
    name: invoiceapp-backend
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: ACCESS_TOKEN_EXPIRE_DAYS
        value: 7
      - key: RESEND_API_KEY
        sync: false
      - key: FROM_EMAIL
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
      - key: STORAGE_PATH
        value: ./storage
      - key: ENVIRONMENT
        value: production
